<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexPe</title>

<style>

/* BODY */
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f5f5f7;

}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
  background: white;
}

.logo {
  font-size: 22px;
}

.nav-links a {
  margin-left: 25px;
  text-decoration: none;
  color: #333;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px;
}

.hero h1 {
  font-size: 48px;
  font-weight: 600;
}

.hero p {
  font-size: 18px;
  color: #666;
  margin-top: 10px;
}

/* BUTTONS */
.btn {
  margin-top: 30px;
  padding: 14px 30px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
}

.primary {
  background: black;
  color: white;
}

/* CENTER BUTTON */
.buttons {
  display: flex;
  justify-content: center;
}

/* RESPONSIVE */
@media(max-width:600px){
  .hero h1 {
    font-size: 32px;
  }
}

</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar">
  <h2 class="logo">NexPe</h2>
  <div class="nav-links">
    <a href="index.html">Home</a>

  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Own the Future.<br>Upgrade Anytime.</h1>
  <p>No upfront cost. Full flexibility.</p>

 <div class="buttons">

  <a href="plans.html">

  </a>

  <a href="calculator.html">

  </a>
