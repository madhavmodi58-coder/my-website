<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexPe Comparison</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
  font-family: -apple-system;
  background: #f5f5f7;
  text-align: center;
  padding: 40px;
}

.container {
  max-width: 1000px;
  margin: auto;
  background: white;
  padding: 40px;
  border-radius: 20px;
}

input, select {
  width: 80%;
  padding: 12px;
  margin: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  padding: 14px 30px;
  background: black;
  color: white;
  border-radius: 30px;
  border: none;
  cursor: pointer;
}

/* RESULTS */
.results {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
  margin-top: 30px;
}

.box {
  padding: 20px;
  border-radius: 15px;
  background: #eee;
}

.highlight {
  background: black;
  color: white;
  transform: scale(1.05);
}

/* INSIGHT */
.insight {
  margin-top: 30px;
  font-size: 18px;
  font-weight: 500;
}

canvas {
  margin-top: 40px;
}

@media(max-width:700px){
  .results {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<div class="container">

<h1>Compare NexPe vs EMI vs Buy</h1>

<select id="phone">
  <option value="1000">iPhone Pro ($1000)</option>
  <option value="800">iPhone Base ($800)</option>
</select>

<input id="months" placeholder="Months (e.g. 20)">
<input id="interest" placeholder="EMI Interest % (e.g. 12)">

<button onclick="calculate()">Compare</button>

<div class="results">
  <div class="box">
    <h3>EMI</h3>
    <p id="emi"></p>
  </div>

  <div class="box highlight">
    <h3>NexPe</h3>
    <p id="nexpe"></p>
  </div>

  <div class="box">
    <h3>Buy</h3>
    <p id="buy"></p>
  </div>
</div>

<div class="insight" id="insight"></div>

<canvas id="chart"></canvas>

</div>

<script>

let chart;

function calculate(){

  let price = parseFloat(document.getElementById("phone").value);
  let months = parseFloat(document.getElementById("months").value);
  let interest = parseFloat(document.getElementById("interest").value);

  if(!months || !interest) return;

  // EMI
  let emiTotal = price * (1 + interest/100);
  let emiMonthly = emiTotal / months;

  // NexPe
  let nexpeMonthly = (price / months) + 5;
  let nexpeTotal = nexpeMonthly * months;

  // Buy
  let buyTotal = price;

  document.getElementById("emi").innerText =
    "$" + emiMonthly.toFixed(2) + "/mo | Total $" + emiTotal.toFixed(0);

  document.getElementById("nexpe").innerText =
    "$" + nexpeMonthly.toFixed(2) + "/mo | Total $" + nexpeTotal.toFixed(0);

  document.getElementById("buy").innerText =
    "One-time $" + buyTotal;

  // INSIGHT
  let savings = emiTotal - nexpeTotal;

  document.getElementById("insight").innerText =
    "💡 You save $" + savings.toFixed(0) + " vs EMI and avoid upfront payment.";

  // CHART
  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
      labels: ["EMI", "NexPe", "Buy"],
      datasets: [{
        label: "Total Cost ($)",
        data: [emiTotal, nexpeTotal, buyTotal]
      }]
    }
  });

}

</script>

</body>
</html>
